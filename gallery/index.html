<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>GALLERY | HOTOME</title>

        <meta name="description" content="オリジナルイラストやファンアートをまとめたギャラリーページです。">

        <link rel="canonical" href="https://hottomeme.com/gallery/">

        <!-- Google Analytics -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-FB651NEBJ9"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag() { dataLayer.push(arguments); }
            gtag('js', new Date());
            gtag('config', 'G-FB651NEBJ9');
        </script>

        <!-- OGP -->
        <meta property="og:title" content="GALLERY | HOTOME">
        <meta property="og:description" content="オリジナルイラストやファンアートをまとめたギャラリーページです。">
        <meta property="og:type" content="website">
        <meta property="og:url" content="https://hottomeme.com/gallery/">
        <meta property="og:image" content=""><!-- 後で作成する -->
        <meta name="twitter:card" content="summary_large_image">

        <link rel="icon" href="/img/favicon.ico">

        <!-- GoogleFont -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">

        <!-- stylesheet -->
        <link rel="stylesheet" href="/css/reset.css">
        <link rel="stylesheet" href="/css/common.css">
        <link rel="stylesheet" href="/css/gallery.css">
    </head>

    <body>
        <div class="wrapper">

            <!-- header -->
            <div id="header"></div>

            <!-- main -->
            <main class="main">
                <div class="main-inner">

                    <section class="section">
                        <h2 class="content-title">GALLERY</h2>

                        <div class="filter-buttons">
                            <button type="button" class="filter-btn active" data-filter="all">ALL</button>
                            <button type="button" class="filter-btn" data-filter="original">ORIGINAL</button>
                            <button type="button" class="filter-btn" data-filter="fanart">FAN ART</button>
                        </div>

                        <!-- jsonから呼び出し -->
                        <div class="gallery"></div>

                    </section>
                    <!-- sectionここまで -->

                    <!-- モーダルウィンドウ -->
                    <div class="modal" id="modal" role="dialog" aria-modal="true">
                        <div class="modal-overlay"></div>

                        <button class="modal-close" aria-label="閉じる"></button>

                        <div class="modal-content">
                            <div class="modal-artwork">
                                <img class="modal-image" src="" alt="">
                                <p class="modal-caption-title"></p>
                                <p class="modal-caption-date"></p>
                            </div>
                        </div>

                        <div class="modal-prev-next-wrap">
                            <button class="modal-prev" aria-label="前へ"></button>
                            <button class="modal-next" aria-label="次へ"></button>
                        </div>
                    </div>
                    <!-- モーダルウィンドウ ここまで -->

                </div>
            </main>
            <!-- mainここまで -->

            <!-- footer -->
            <div id="footer"></div>

            <!-- page-top -->
            <button class="page-top" aria-label="ページトップへ">
                <span class="page-top-arrow"></span>
            </button>

        </div>
        <!-- wrapperここまで -->

        <script src="/js/jquery-3.7.1.min.js"></script>
        <script src="/js/common.js"></script>
        <script src="/js/gallery.js"></script>
        <script src="/js/modal.js"></script>
    </body>
</html>
