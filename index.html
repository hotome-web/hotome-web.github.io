<!DOCTYPE html>

        <link rel="icon" href="./img/favicon.ico">

        <!-- GoogleFont -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">

    <body>

            <!-- header -->

                <!-- <div class="main-inner"> -->

                    <section class="kv">

                                            <stop offset="50%" stop-color="#99a8af" />
                                            <stop offset="100%" stop-color="#fefdfc" />

                                            <animateTransform attributeName="gradientTransform" type="translate" from="-65 0" to="65 0" dur="3s" repeatCount="indefinite" />
