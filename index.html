    <body>
        <div class="wrapper">

            <!-- header -->

            <main class="main">

                    <section class="kv">
                        <div class="kv-wrap">
                            <video class="kv-video" autoplay muted loop playsinline oncontextmenu="return false;">
                                <source src="/img/kv_hotome.mp4" type="video/mp4">
                            </video>
                            <a href="/about/" class="more">
                                <svg viewBox="0 0 65 11" xmlns="http://www.w3.org/2000/svg">

                                        <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%" gradientUnits="userSpaceOnUse">

                                            <stop offset="50%" stop-color="#99a8af" />
                                            <stop offset="100%" stop-color="#fefdfc" />
                                            <!-- 新ブラウザ向け：流れるアニメーション -->
                                            <animateTransform attributeName="gradientTransform" type="translate" from="-65 0" to="65 0" dur="3s" repeatCount="indefinite" />
                                        </linearGradient>
                                    </defs>
                                    <path d="M1 10H63L56.641 1" stroke="url(#arrowGradient)" fill="none" />
                                </svg>
                                <span class="label">more</span>
